aid: javascript
name: JavaScript
description: >-
  JavaScript is a lightweight, interpreted, or just-in-time compiled programming
  language with first-class functions. It is a multi-paradigm, dynamic language
  supporting object-oriented, imperative, and declarative programming styles.
  The JavaScript Web APIs include the Fetch API, Web Storage, WebSockets,
  Canvas API, Geolocation, and many more browser-provided interfaces.
